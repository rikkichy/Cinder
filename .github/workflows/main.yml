name: Build

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version
        run: |
          PROPS="gradle.properties"
          OLD_CODE=$(grep -oP 'APP_VERSION_CODE=\K\d+' "$PROPS")
          OLD_NAME=$(grep -oP 'APP_VERSION_NAME=\K.+' "$PROPS")
          NEW_CODE=$((OLD_CODE + 1))

          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_NAME"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_NAME="${MAJOR}.${MINOR}.${PATCH}"

          sed -i "s/APP_VERSION_CODE=$OLD_CODE/APP_VERSION_CODE=$NEW_CODE/" "$PROPS"
          sed -i "s/APP_VERSION_NAME=$OLD_NAME/APP_VERSION_NAME=$NEW_NAME/" "$PROPS"

          echo "NEW_VERSION=$NEW_NAME" >> "$GITHUB_ENV"
          echo "NEW_VERSION_CODE=$NEW_CODE" >> "$GITHUB_ENV"
          echo "Bumped $OLD_NAME ($OLD_CODE) → $NEW_NAME ($NEW_CODE)"

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant Gradle wrapper permission
        run: chmod +x ./gradlew

      - name: Decode keystore (release)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64" || (echo "Missing ANDROID_KEYSTORE_BASE64" && exit 1)
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "${RUNNER_TEMP}/keystore.jks"
          echo "ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/keystore.jks" >> "$GITHUB_ENV"

      - name: Build Release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ env.ANDROID_KEYSTORE_PATH }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :TMessagesProj_App:assembleAfatRelease

      - name: Attest APK provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: TMessagesProj_App/build/outputs/apk/afat/release/*.apk

      - name: Collect and rename APK
        run: |
          mkdir -p dist
          cp TMessagesProj_App/build/outputs/apk/afat/release/*.apk "dist/cinder-v${{ env.NEW_VERSION }}.apk"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties
          git commit -m "Bump version to v${{ env.NEW_VERSION }} (${{ env.NEW_VERSION_CODE }})"
          git push

      - name: Create draft release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ env.NEW_VERSION }}
        run: |
          BODY="### App
          + No changes.

          ### Build
          + No changes.

          ### Repo
          + No changes."

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --draft --title "$TAG" --notes "$BODY"

          gh release upload "$TAG" dist/* --clobber
